<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0A0C10" />
  <title>Cut & Build · Tracker</title>

  <!-- PWA / iOS home-screen app -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cut & Build" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- Sidebar / nav (desktop) -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3.6"/></svg></span>
        <div class="brand-text">Cut&nbsp;&amp;&nbsp;Build<small id="brand-sub">195 → 175 lb</small></div>
      </div>
      <nav class="nav" id="nav">
        <button class="nav-item active" data-view="dashboard"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7.5" height="7.5" rx="2.2"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="2.2"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="2.2"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="2.2"/></svg></span> Dashboard</button>
        <button class="nav-item" data-view="nutrition"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v5a2.5 2.5 0 0 0 5 0V3"/><path d="M8.5 10.5V21"/><path d="M17.5 3c-1.6 1-2.5 3.2-2.5 6 0 2.2 1 3.4 2.5 3.5"/><path d="M17.5 3v18"/></svg></span> Nutrition</button>
        <button class="nav-item" data-view="weight"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4.5"/><path d="M9 8.5a4 4 0 0 1 6 0"/><path d="M12 8.7 12 11.5"/></svg></span> Weight</button>
        <button class="nav-item" data-view="training"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 7v10"/><path d="M9.2 8.8v6.4"/><path d="M14.8 8.8v6.4"/><path d="M17.5 7v10"/><path d="M9.2 12h5.6"/><path d="M3.6 9.5v5"/><path d="M20.4 9.5v5"/></svg></span> Training</button>
        <button class="nav-item" data-view="running"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="4.5" r="2"/><path d="M14.5 8.5 12 13.5"/><path d="M12 13.5l3 1.8-1 4.2"/><path d="M12 13.5 8.8 15l1.4 4"/><path d="M14.5 8.5l2.6 1.8-1.1 2.5"/><path d="M14.5 8.5 11 9.6"/></svg></span> Running</button>
        <button class="nav-item" data-view="plan"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="3"/><path d="M3 9h18"/><path d="M8 3v3"/><path d="M16 3v3"/><path d="M7.5 13h3.5"/><path d="M7.5 16.5h3.5"/><path d="M14.5 13h2"/><path d="M14.5 16.5h2"/></svg></span> The Plan</button>
      </nav>
      <div class="sidebar-foot">
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">◐ Theme</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="topbar">
        <h1 id="view-title">Dashboard</h1>
        <div class="date-picker">
          <button class="icon-btn" id="date-prev" title="Previous day">‹</button>
          <input type="date" id="active-date" />
          <button class="icon-btn" id="date-next" title="Next day">›</button>
          <button class="btn-ghost" id="date-today">Today</button>
        </div>
      </header>
      <section id="view" class="view"></section>
    </main>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav" id="mobile-nav">
    <button class="active" data-view="dashboard"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7.5" height="7.5" rx="2.2"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="2.2"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="2.2"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="2.2"/></svg><span>Home</span></button>
    <button data-view="nutrition"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v5a2.5 2.5 0 0 0 5 0V3"/><path d="M8.5 10.5V21"/><path d="M17.5 3c-1.6 1-2.5 3.2-2.5 6 0 2.2 1 3.4 2.5 3.5"/><path d="M17.5 3v18"/></svg><span>Food</span></button>
    <button data-view="weight"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4.5"/><path d="M9 8.5a4 4 0 0 1 6 0"/><path d="M12 8.7 12 11.5"/></svg><span>Weight</span></button>
    <button data-view="training"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 7v10"/><path d="M9.2 8.8v6.4"/><path d="M14.8 8.8v6.4"/><path d="M17.5 7v10"/><path d="M9.2 12h5.6"/><path d="M3.6 9.5v5"/><path d="M20.4 9.5v5"/></svg><span>Train</span></button>
    <button data-view="running"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="4.5" r="2"/><path d="M14.5 8.5 12 13.5"/><path d="M12 13.5l3 1.8-1 4.2"/><path d="M12 13.5 8.8 15l1.4 4"/><path d="M14.5 8.5l2.6 1.8-1.1 2.5"/><path d="M14.5 8.5 11 9.6"/></svg><span>Run</span></button>
    <button data-view="plan"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="3"/><path d="M3 9h18"/><path d="M8 3v3"/><path d="M16 3v3"/><path d="M7.5 13h3.5"/><path d="M7.5 16.5h3.5"/><path d="M14.5 13h2"/><path d="M14.5 16.5h2"/></svg><span>Plan</span></button>
  </nav>

  <div id="toast" class="toast"></div>

  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
